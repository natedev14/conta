<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FAFAF9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Conta">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="icon-180.png">
    <title>Conta</title>
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #FAFAF9;
            --bg-elevated: #FFFFFF;
            --fg: #0A0A0A;
            --fg-muted: #737373;
            --fg-subtle: #A3A3A3;
            --border: #E7E5E4;
            --border-strong: #D6D3D1;
            --accent: #B45309;
            --accent-bg: #FEF3C7;
            --danger: #991B1B;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg); color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-feature-settings: 'cv11', 'ss01', 'ss03';
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
            overflow: hidden;
            height: 100vh; height: 100dvh;
        }

        @supports (font-variation-settings: normal) {
            html, body { font-family: 'Inter var', -apple-system, system-ui, sans-serif; }
        }

        #root {
            height: 100vh; height: 100dvh;
            max-width: 480px; margin: 0 auto;
            position: relative; overflow: hidden;
            background: var(--bg);
        }

        .tabular { font-variant-numeric: tabular-nums; }

        button, input {
            font-family: inherit; border: none; outline: none;
            background: none; padding: 0; color: inherit;
        }
        input::placeholder { color: var(--fg-subtle); }

        .screen { position: absolute; inset: 0; }

        .keypad-btn {
            height: 64px; font-size: 28px; font-weight: 500;
            border-radius: 14px; background: var(--bg-elevated);
            border: 1px solid var(--border);
            transition: transform 80ms ease, background 80ms ease;
            font-variant-numeric: tabular-nums;
        }
        .keypad-btn:active { transform: scale(0.96); background: var(--border); }

        .swatch {
            width: 56px; height: 56px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; position: relative;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .swatch-talla {
            position: absolute; bottom: -6px; right: -6px;
            background: var(--bg-elevated); color: var(--fg);
            border: 1px solid var(--border);
            min-width: 26px; height: 26px; padding: 0 6px;
            border-radius: 13px;
            font-size: 12px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            font-variant-numeric: tabular-nums;
        }

        .suggestion { animation: slideIn 180ms cubic-bezier(0.32, 0.72, 0, 1) both; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .suggestion:active { background: var(--border) !important; transition: background 80ms; }

        ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const COLORES = {
            'preto': '#18181B', 'branco': '#FAFAFA', 'off white': '#F5F0E6', 'off-white': '#F5F0E6',
            'cinza': '#71717A', 'grafite': '#3F3F46',
            'bege': '#D6C7A6', 'nude': '#E8D3BD', 'caramelo': '#AE6A3F',
            'marrom': '#5C3B1E', 'chocolate': '#3D2817', 'café': '#4A2C1A', 'cafe': '#4A2C1A',
            'vermelho': '#B91C1C', 'vinho': '#6E1A2D', 'bordô': '#5C1F29', 'bordo': '#5C1F29',
            'rosa': '#EC4899', 'rosa pink': '#DB2777', 'pink': '#DB2777',
            'rosa bebê': '#FBCFE8', 'rosa bebe': '#FBCFE8',
            'rosa claro': '#F9A8D4', 'rosa escuro': '#BE185D',
            'coral': '#FF7F50', 'salmão': '#FA8072', 'salmao': '#FA8072', 'pêssego': '#FFDAB9', 'pessego': '#FFDAB9',
            'laranja': '#EA580C', 'mostarda': '#D97706', 'amarelo': '#EAB308',
            'verde': '#16A34A', 'verde musgo': '#3F6212', 'verde militar': '#365314',
            'verde água': '#5EEAD4', 'verde agua': '#5EEAD4',
            'verde menta': '#A7F3D0', 'verde bandeira': '#15803D',
            'azul': '#2563EB', 'azul marinho': '#1E2952', 'azul royal': '#1D4ED8',
            'azul bebê': '#BAE6FD', 'azul bebe': '#BAE6FD',
            'azul claro': '#93C5FD', 'azul escuro': '#1E3A8A',
            'azul jeans': '#3B5998', 'jeans': '#3B5998',
            'roxo': '#7E22CE', 'lilás': '#C084FC', 'lilas': '#C084FC', 'lavanda': '#E9D5FF',
            'turquesa': '#06B6D4', 'tiffany': '#81D4D4',
            'dourado': '#B8860B', 'prata': '#9CA3AF', 'bronze': '#8C6E3E',
        };

        function isDark(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return (0.299*r + 0.587*g + 0.114*b) / 255 < 0.6;
        }

        function getColorInfo(colorStr) {
            if (!colorStr) return { hex: '#E5E7EB', dark: false };
            const key = colorStr.toLowerCase().trim();
            if (COLORES[key]) return { hex: COLORES[key], dark: isDark(COLORES[key]) };
            for (const [n, h] of Object.entries(COLORES)) {
                if (key.includes(n)) return { hex: h, dark: isDark(h) };
            }
            return { hex: '#E5E7EB', dark: false };
        }

        function parseDescripcion(desc) {
            if (!desc) return { nombre: "", cor: null, tamanho: null };
            const m = desc.match(/^(.+?)\s*COR:([^;]+);TAMANHO:(.+)$/);
            if (m) return { nombre: m[1].trim(), cor: m[2].trim(), tamanho: m[3].trim() };
            return { nombre: desc, cor: null, tamanho: null };
        }

        function normalizar(str) {
            return (str || "").toString().toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        }

        function vibrate(ms = 10) { if (navigator.vibrate) navigator.vibrate(ms); }

        // --- Persistencia: guarda conteos + firma del CSV ---
        const STORAGE_KEY = 'gissary_conteo_v1';

        // Firma del CSV: cantidad de filas + SKUs de las primeras 3 filas.
        // Suficientemente único sin ser un hash completo (que sería lento con 7k filas).
        function csvSignature(data) {
            return `${data.length}|${data.slice(0,3).map(r => r._sku).join(',')}`;
        }

        function saveProgress(data) {
            try {
                const contadas = data.filter(r => r._conteo !== "");
                if (contadas.length === 0) {
                    // Nada que guardar; limpiamos por si había algo viejo
                    localStorage.removeItem(STORAGE_KEY);
                    return;
                }
                const payload = {
                    sig: csvSignature(data),
                    savedAt: Date.now(),
                    conteos: contadas.map(r => [r._id, r._conteo])
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            } catch (e) { /* quota, modo privado, etc. — ignorar */ }
        }

        function loadProgress(data) {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (parsed.sig !== csvSignature(data)) return null; // CSV diferente
                return parsed; // { sig, savedAt, conteos: [[id, "19"], ...] }
            } catch (e) { return null; }
        }

        function clearProgress() {
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        }

        function formatTimeAgo(ts) {
            const mins = Math.round((Date.now() - ts) / 60000);
            if (mins < 1) return "agora mesmo";
            if (mins < 60) return `há ${mins} min`;
            const hours = Math.round(mins / 60);
            if (hours < 24) return `há ${hours} h`;
            return `há ${Math.round(hours / 24)} d`;
        }

        // ----- Pantalla 1: Carga -----
        function SetupScreen({ onLoad }) {
            const fileRef = useRef();
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                Papa.parse(file, {
                    header: true, delimiter: ';', skipEmptyLines: true,
                    complete: (results) => {
                        const clean = results.data.map((row, i) => {
                            const sku = (row['Codigo produto'] || "").trim();
                            const desc = row['Descrição Produto'] || "";
                            const p = parseDescripcion(desc);
                            return {
                                ...row, _id: i, _conteo: "",
                                _sku: sku, _nombre: p.nombre, _cor: p.cor, _tamanho: p.tamanho,
                                _searchBlob: normalizar(sku + " " + desc)
                            };
                        });
                        onLoad(clean);
                    }
                });
            };

            return (
                <div className="screen" style={{
                    display: 'flex', flexDirection: 'column',
                    justifyContent: 'center', alignItems: 'center',
                    padding: '40px', textAlign: 'center'
                }}>
                    <div style={{ fontSize: 44, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1.05, marginBottom: 16 }}>
                        Conta
                    </div>
                    <div style={{ fontSize: 17, color: 'var(--fg-muted)', maxWidth: 280, lineHeight: 1.4, marginBottom: 60 }}>
                        Carregue o CSV de estoque do Bling para começar.
                    </div>
                    <button onClick={() => fileRef.current.click()} style={{
                        background: 'var(--fg)', color: 'var(--bg)',
                        fontSize: 17, fontWeight: 500, padding: '18px 32px',
                        borderRadius: 14, letterSpacing: '-0.01em'
                    }}>
                        Escolher arquivo
                    </button>
                    <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: 'none' }} />
                </div>
            );
        }

        // ----- Pantalla 2: Búsqueda -----
        function SearchScreen({ data, onSelect, onOpenSummary, contadosCount }) {
            const [query, setQuery] = useState("");
            const inputRef = useRef();

            useEffect(() => { setTimeout(() => inputRef.current?.focus(), 100); }, []);

            const suggestions = useMemo(() => {
                if (!query.trim()) return [];
                const tokens = normalizar(query).split(/\s+/).filter(Boolean);
                const matches = [];
                for (const row of data) {
                    if (tokens.every(t => row._searchBlob.includes(t))) {
                        matches.push(row);
                        if (matches.length >= 4) break;
                    }
                }
                return matches;
            }, [data, query]);

            return (
                <div className="screen" style={{
                    display: 'flex', flexDirection: 'column', height: '100%',
                    paddingTop: 'env(safe-area-inset-top, 20px)'
                }}>
                    <div style={{ padding: '20px 24px 0' }}>
                        <div style={{
                            fontSize: 12, color: 'var(--fg-subtle)', fontWeight: 600,
                            letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 14
                        }}>
                            Procurar produto
                        </div>
                        <input
                            ref={inputRef} type="text" value={query}
                            onChange={(e) => setQuery(e.target.value)}
                            placeholder="SKU, nome, cor..."
                            autoComplete="off" autoCorrect="off"
                            autoCapitalize="off" spellCheck="false"
                            style={{
                                width: '100%', fontSize: 28, fontWeight: 500,
                                letterSpacing: '-0.02em', padding: '8px 0 20px',
                                borderBottom: '1px solid var(--border)'
                            }}
                        />
                    </div>

                    <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 0' }}>
                        {suggestions.map((row, idx) => {
                            const color = getColorInfo(row._cor);
                            const isContado = row._conteo !== "";
                            return (
                                <button key={row._id} className="suggestion"
                                    onClick={() => { vibrate(8); onSelect(row._id); }}
                                    style={{
                                        width: '100%', display: 'flex', alignItems: 'center', gap: 14,
                                        padding: '14px 12px', borderRadius: 12, textAlign: 'left',
                                        animationDelay: `${idx * 30}ms`,
                                        background: isContado ? 'var(--accent-bg)' : 'transparent',
                                        marginBottom: 4
                                    }}>
                                    <div className="swatch" style={{
                                        background: color.hex, color: color.dark ? '#fff' : '#000',
                                        width: 44, height: 44, fontSize: 16
                                    }}>
                                        {row._tamanho && (
                                            <span className="swatch-talla" style={{ fontSize: 10, minWidth: 22, height: 22 }}>
                                                {row._tamanho}
                                            </span>
                                        )}
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{
                                            fontSize: 15, fontWeight: 500, letterSpacing: '-0.01em',
                                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'
                                        }}>
                                            {row._nombre}
                                        </div>
                                        <div style={{
                                            fontSize: 12, color: 'var(--fg-muted)', marginTop: 2,
                                            fontVariantNumeric: 'tabular-nums',
                                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'
                                        }}>
                                            {row._sku}{row._cor && ` · ${row._cor}`}
                                        </div>
                                    </div>
                                    {isContado && (
                                        <div className="tabular" style={{
                                            fontSize: 20, fontWeight: 600, color: 'var(--accent)',
                                            minWidth: 32, textAlign: 'right'
                                        }}>
                                            {row._conteo}
                                        </div>
                                    )}
                                </button>
                            );
                        })}

                        {query.trim() && suggestions.length === 0 && (
                            <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--fg-subtle)', fontSize: 15 }}>
                                Nenhum resultado.
                            </div>
                        )}
                        {!query.trim() && (
                            <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--fg-subtle)', fontSize: 14, lineHeight: 1.5 }}>
                                Digite o código ou parte do nome.
                            </div>
                        )}
                    </div>

                    {contadosCount > 0 && (
                        <button onClick={onOpenSummary} style={{
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                            padding: '20px 24px calc(20px + env(safe-area-inset-bottom, 0))',
                            borderTop: '1px solid var(--border)', background: 'var(--bg-elevated)'
                        }}>
                            <span style={{ fontSize: 15, color: 'var(--fg-muted)' }}>Contagens</span>
                            <span className="tabular" style={{
                                fontSize: 17, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8
                            }}>
                                {contadosCount}
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                                    <path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                                </svg>
                            </span>
                        </button>
                    )}
                </div>
            );
        }

        // ----- Pantalla 3: Contar -----
        function CountScreen({ row, onSave, onBack, onClear }) {
            const [valor, setValor] = useState(row._conteo || "");
            const color = getColorInfo(row._cor);

            const pressKey = (key) => {
                vibrate(5);
                if (key === 'del') setValor(v => v.slice(0, -1));
                else {
                    setValor(v => {
                        if (v.length >= 5) return v;
                        if (v === "0") return key;
                        return v + key;
                    });
                }
            };

            const handleSave = () => { vibrate(15); onSave(row._id, valor); };
            const handleClear = () => { vibrate(10); setValor(""); onClear(row._id); };

            return (
                <div className="screen" style={{
                    display: 'flex', flexDirection: 'column', height: '100%',
                    background: 'var(--bg)', paddingTop: 'env(safe-area-inset-top, 20px)'
                }}>
                    <div style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        padding: '16px 20px'
                    }}>
                        <button onClick={onBack} style={{
                            display: 'flex', alignItems: 'center', gap: 6,
                            fontSize: 15, color: 'var(--fg-muted)', padding: '8px 0'
                        }}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            Voltar
                        </button>
                        {row._conteo !== "" && (
                            <button onClick={handleClear} style={{
                                fontSize: 14, color: 'var(--danger)', padding: '8px 0'
                            }}>
                                Apagar
                            </button>
                        )}
                    </div>

                    <div style={{ padding: '20px 28px 0' }}>
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 20 }}>
                            <div className="swatch" style={{
                                background: color.hex, color: color.dark ? '#fff' : '#000'
                            }}>
                                {row._tamanho && <span className="swatch-talla">{row._tamanho}</span>}
                            </div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{
                                    fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em',
                                    lineHeight: 1.25, marginBottom: 6
                                }}>
                                    {row._nombre}
                                </div>
                                <div style={{
                                    fontSize: 13, color: 'var(--fg-muted)',
                                    fontVariantNumeric: 'tabular-nums'
                                }}>
                                    {row._sku}{row._cor && <span> · {row._cor}</span>}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style={{
                        flex: 1, display: 'flex', alignItems: 'center',
                        justifyContent: 'center', padding: '20px 24px'
                    }}>
                        <div className="tabular" style={{
                            fontSize: valor.length > 3 ? 120 : 160, fontWeight: 700,
                            letterSpacing: '-0.05em', lineHeight: 1,
                            color: valor === "" ? 'var(--fg-subtle)' : 'var(--fg)',
                            transition: 'font-size 120ms ease'
                        }}>
                            {valor === "" ? "0" : valor}
                        </div>
                    </div>

                    <div style={{ padding: '0 16px calc(12px + env(safe-area-inset-bottom, 0))' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 8 }}>
                            {['1','2','3','4','5','6','7','8','9'].map(n => (
                                <button key={n} className="keypad-btn" onClick={() => pressKey(n)}>{n}</button>
                            ))}
                            <button className="keypad-btn" onClick={() => pressKey('0')} style={{ gridColumn: '2 / 3' }}>0</button>
                            <button className="keypad-btn" onClick={() => pressKey('del')}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ verticalAlign: 'middle' }}>
                                    <path d="M20 4H8.5a2 2 0 00-1.5.7L2 12l5 7.3a2 2 0 001.5.7H20a2 2 0 002-2V6a2 2 0 00-2-2z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                                    <path d="M12 9l6 6M18 9l-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                                </svg>
                            </button>
                        </div>
                        <button onClick={handleSave} disabled={valor === ""} style={{
                            width: '100%',
                            background: valor === "" ? 'var(--border)' : 'var(--fg)',
                            color: valor === "" ? 'var(--fg-subtle)' : 'var(--bg)',
                            fontSize: 17, fontWeight: 500, padding: '20px',
                            borderRadius: 14, letterSpacing: '-0.01em',
                            transition: 'background 120ms ease'
                        }}>
                            Salvar
                        </button>
                    </div>
                </div>
            );
        }

        // ----- Pantalla 4: Resumen -----
        function SummaryScreen({ data, onBack, onExport, onClear }) {
            const contadas = data.filter(r => r._conteo !== "");
            const total = contadas.reduce((s, r) => s + parseInt(r._conteo, 10), 0);

            return (
                <div className="screen" style={{
                    display: 'flex', flexDirection: 'column', height: '100%',
                    background: 'var(--bg)', paddingTop: 'env(safe-area-inset-top, 20px)'
                }}>
                    <div style={{ padding: '16px 20px' }}>
                        <button onClick={onBack} style={{
                            display: 'flex', alignItems: 'center', gap: 6,
                            fontSize: 15, color: 'var(--fg-muted)', padding: '8px 0'
                        }}>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            Voltar
                        </button>
                    </div>

                    <div style={{ padding: '8px 28px 24px' }}>
                        <div style={{ fontSize: 44, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1.05 }}>
                            {contadas.length} <span style={{ color: 'var(--fg-muted)', fontWeight: 500 }}>
                                {contadas.length === 1 ? 'item' : 'itens'}
                            </span>
                        </div>
                        <div className="tabular" style={{ fontSize: 15, color: 'var(--fg-muted)', marginTop: 6 }}>
                            {total} unidades no total
                        </div>
                    </div>

                    <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px' }}>
                        {contadas.map(row => {
                            const color = getColorInfo(row._cor);
                            return (
                                <div key={row._id} style={{
                                    display: 'flex', alignItems: 'center', gap: 14,
                                    padding: '14px 12px', borderBottom: '1px solid var(--border)'
                                }}>
                                    <div className="swatch" style={{
                                        background: color.hex, color: color.dark ? '#fff' : '#000',
                                        width: 36, height: 36
                                    }}>
                                        {row._tamanho && (
                                            <span className="swatch-talla" style={{ fontSize: 9, minWidth: 18, height: 18 }}>
                                                {row._tamanho}
                                            </span>
                                        )}
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{
                                            fontSize: 14, fontWeight: 500,
                                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'
                                        }}>
                                            {row._nombre}
                                        </div>
                                        <div style={{ fontSize: 12, color: 'var(--fg-muted)', marginTop: 2 }}>
                                            {row._sku}
                                        </div>
                                    </div>
                                    <div className="tabular" style={{ fontSize: 20, fontWeight: 600 }}>
                                        {row._conteo}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div style={{
                        padding: '16px 16px calc(16px + env(safe-area-inset-bottom, 0))',
                        borderTop: '1px solid var(--border)', background: 'var(--bg-elevated)',
                        display: 'flex', gap: 10
                    }}>
                        <button onClick={onClear} style={{
                            background: 'transparent', color: 'var(--fg-muted)',
                            fontSize: 15, fontWeight: 500, padding: '18px 20px', borderRadius: 14
                        }}>
                            Reiniciar
                        </button>
                        <button onClick={onExport} style={{
                            flex: 1, background: 'var(--fg)', color: 'var(--bg)',
                            fontSize: 17, fontWeight: 500, padding: '18px', borderRadius: 14
                        }}>
                            Exportar CSV
                        </button>
                    </div>
                </div>
            );
        }

        // ----- App -----
        function App() {
            const [data, setData] = useState([]);
            const [screen, setScreen] = useState('setup');
            const [selectedId, setSelectedId] = useState(null);

            const contadosCount = useMemo(() => data.filter(r => r._conteo !== "").length, [data]);

            useEffect(() => {
                const handler = (e) => {
                    if (contadosCount > 0) { e.preventDefault(); e.returnValue = ""; }
                };
                window.addEventListener("beforeunload", handler);
                return () => window.removeEventListener("beforeunload", handler);
            }, [contadosCount]);

            // Auto-guardar progreso cada vez que cambian los conteos
            useEffect(() => {
                if (data.length > 0) saveProgress(data);
            }, [data]);

            const handleLoad = (clean) => {
                // Verificar si hay progreso guardado para este mismo CSV
                const saved = loadProgress(clean);
                if (saved && saved.conteos.length > 0) {
                    const hace = formatTimeAgo(saved.savedAt);
                    const msg = `Encontrei ${saved.conteos.length} contagens salvas (${hace}).\n\nRecuperar?`;
                    if (confirm(msg)) {
                        // Restaurar conteos
                        const restored = [...clean];
                        for (const [id, valor] of saved.conteos) {
                            if (restored[id]) restored[id] = { ...restored[id], _conteo: valor };
                        }
                        setData(restored);
                        setScreen('search');
                        return;
                    } else {
                        // El usuario decidió no recuperar: limpiar storage viejo
                        clearProgress();
                    }
                }
                setData(clean);
                setScreen('search');
            };
            const handleSelect = (id) => { setSelectedId(id); setScreen('count'); };

            const handleSave = (id, valor) => {
                setData(prev => {
                    const next = [...prev];
                    next[id] = { ...next[id], _conteo: valor };
                    return next;
                });
                setScreen('search');
            };

            const handleClear = (id) => {
                setData(prev => {
                    const next = [...prev];
                    next[id] = { ...next[id], _conteo: "" };
                    return next;
                });
            };

            const handleClearAll = () => {
                setData(prev => prev.map(r => ({ ...r, _conteo: "" })));
                clearProgress();
                setScreen('search');
            };

            const handleExport = () => {
                const contadas = data.filter(r => r._conteo !== "");
                if (contadas.length === 0) return;

                const exportData = contadas.map(row => {
                    const { _id, _conteo, _sku, _nombre, _cor, _tamanho, _searchBlob, ...rest } = row;
                    const num = parseInt(_conteo, 10);
                    return {
                        ...rest,
                        'Codigo produto': _sku, // SKU limpio sin \t final
                        'Balanço': isNaN(num) ? "0" : `${num}`
                    };
                });

                const csv = Papa.unparse(exportData, { delimiter: ';', quotes: true });
                const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `conteo_bling_${contadas.length}_itens.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                vibrate(20);

                if (confirm("Arquivo baixado! Reiniciar a contagem?")) handleClearAll();
            };

            const selectedRow = selectedId !== null ? data[selectedId] : null;

            return (
                <>
                    {screen === 'setup' && <SetupScreen onLoad={handleLoad} />}
                    {screen === 'search' && (
                        <SearchScreen data={data} onSelect={handleSelect}
                            onOpenSummary={() => setScreen('summary')} contadosCount={contadosCount} />
                    )}
                    {screen === 'count' && selectedRow && (
                        <CountScreen row={selectedRow} onSave={handleSave}
                            onBack={() => setScreen('search')} onClear={handleClear} />
                    )}
                    {screen === 'summary' && (
                        <SummaryScreen data={data} onBack={() => setScreen('search')}
                            onExport={handleExport}
                            onClear={() => { if (confirm("Apagar todas as contagens?")) handleClearAll(); }} />
                    )}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
